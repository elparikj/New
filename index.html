<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
/* ---------- GLOBAL ---------- */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #000;
  overflow: hidden;
}

/* ---------- FAKE HOME SCREEN ---------- */
#home {
  height: 100vh;
  background: linear-gradient(180deg, #1c1c1e, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.app-icon {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff2d55, #ff375f);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  color: white;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.2s;
}

.app-icon:active {
  transform: scale(0.9);
}

.icon-label {
  color: white;
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.8;
}

/* ---------- SPLASH ---------- */
#splash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: #fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.splash-icon {
  width: 100px;
  height: 100px;
  border-radius: 22px;
  background: linear-gradient(135deg,#ff2d55,#ff375f);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  color:white;
  animation: pop 0.6s ease;
}

@keyframes pop {
  from { transform: scale(0.6); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

/* ---------- APP ---------- */
#app {
  display:none;
  background: #f2f2f7;
  height: 100vh;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  margin-top: 20px;
  text-align: center;
}

.title {
  font-size: 14px;
  color: #6e6e73;
}

/* typing */
#typing {
  font-size: 18px;
  min-height: 24px;
  margin-top: 10px;
}

/* game */
.word {
  font-size: 26px;
  letter-spacing: 6px;
  margin: 25px 0;
}

.letters {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

.letters button {
  width:38px;
  height:38px;
  border-radius:10px;
  border:none;
  background:#e5e5ea;
  font-weight:600;
}

.letters button:disabled {
  opacity:0.3;
}

/* final */
#final {
  display:none;
}

.big {
  font-size:22px;
  font-weight:600;
}

/* buttons */
.btn {
  padding:12px 16px;
  border-radius:12px;
  border:none;
}

.yes {
  background:#ff2d55;
  color:white;
}

.no {
  background:#e5e5ea;
}

/* confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(120vh) rotate(720deg);
  }
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div onclick="openApp()" class="app-icon">💌</div>
  <div class="icon-label">Tap to open</div>
</div>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">💌</div>
</div>

<!-- APP -->
<div id="app">

  <div class="card">
    <div class="title">Messages</div>
    <div id="typing"></div>

    <div id="game" style="display:none;">
      <div class="word" id="word"></div>
      <div class="letters" id="letters"></div>
    </div>

    <div id="final">
      <div class="big">Will you be my girlfriend? ❤️</div>
      <div style="color:#6e6e73; font-size:14px; margin-top:6px;">
        I've been meaning to ask you this.
      </div>

      <div style="margin-top:20px;">
        <button class="btn yes" onclick="yes()">Yes 💕</button>
        <button class="btn no" onmouseover="moveNo(this)">No 🙃</button>
      </div>
    </div>

  </div>
</div>

<script>

const phrase = "WILL YOU BE MY GIRLFRIEND";
let guessed = [];

/* ---------- FAKE APP OPEN ---------- */
function openApp() {
  document.getElementById("home").style.display = "none";
  document.getElementById("splash").style.display = "flex";

  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
    typeText();
  }, 1200);
}

/* ---------- TYPING ---------- */
const text = "Hey… I made this for you.";
let i = 0;

function typeText() {
  const el = document.getElementById("typing");

  let interval = setInterval(() => {
    el.innerHTML += text[i];
    i++;

    if (i >= text.length) {
      clearInterval(interval);
      setTimeout(startGame, 800);
    }
  }, 60);
}

/* ---------- GAME ---------- */
function startGame() {
  document.getElementById("game").style.display = "block";
  createLetters();
  displayWord();
}

function displayWord() {
  document.getElementById("word").innerHTML =
    phrase.split("").map(l =>
      l === " " ? " " : (guessed.includes(l) ? l : "_")
    ).join("");

  if (!document.getElementById("word").innerText.includes("_")) {
    document.getElementById("game").style.display = "none";
    document.getElementById("final").style.display = "block";
  }
}

function createLetters() {
  const container = document.getElementById("letters");

  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    const btn = document.createElement("button");
    btn.innerText = letter;

    btn.onclick = () => {
      guessed.push(letter);
      btn.disabled = true;
      displayWord();
    };

    container.appendChild(btn);
  });
}

/* ---------- FINAL ---------- */
function yes() {
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:120px;'>❤️ YAY ❤️</h1>";
  launchConfetti();
}

function moveNo(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * 70 + "%";
  btn.style.left = Math.random() * 70 + "%";
}

/* ---------- CONFETTI ---------- */
function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["#ff2d55","#5856d6","#34c759","#ffcc00"][Math.floor(Math.random()*4)];
    c.style.animationDuration = (2 + Math.random()*2) + "s";
    document.body.appendChild(c);
  }
}

</script>

</body>
</html>
